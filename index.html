<!DOCTYPE HTML>
<html>
<head>
<meta charset="utf-8">
<title>证书信息</title>

<script src="https://cdn.jsdelivr.net/npm/qrcodejs/qrcode.min.js"></script>

<style>
*{margin:0; padding:0; border:0;}
.bxytab table {
    width: 500px;
    background:#d4e1ea;
    margin:40px auto;
    border-collapse: collapse;
    font-size:14px;
}
.bxytab table tr { border: 1px solid #fff;}
.bxytab table th {
    width: 45%;
    padding-right:20px;
    color: #4d4b47;
    border-right: 1px solid #fff;
    font-weight:normal;
    text-align:right;
}
.bxytab table td {
    line-height: 34px;
    padding: 3px 20px;
    color: #4d4b47;
}
#qrcode img{
    width:150px;
    height:150px;
    border:10px solid #fff;
}
.bxytab table tr:nth-child(odd){background:#c3c1c2;}

@media (max-width:1000px){
  .bxytab table{ width:100%;font-size:18px;}
}
</style>
</head>

<body>

<div class="bxytab">
<table>
<tbody>
<tr>
    <th></th>
    <td id="qrcode"></td>
</tr>
<tr><th>姓名：</th><td>黄恩庭</td></tr>
<tr><th>性别：</th><td>男</td></tr>
<tr><th>编号：</th><td>202010000106</td></tr>
<tr><th>身份证号：</th><td>452423197009202412</td></tr>
<tr><th>工种：</th><td>有害生物防制员高级</td></tr>
<tr><th>颁发日期：</th><td>2020-10-14</td></tr>
<tr><th>年审日期：</th><td>长期</td></tr>
</tbody>
</table>
</div>

<script>
// 👉 二维码内容（可以改成任意链接）
new QRCode(document.getElementById("qrcode"), {
    text: window.location.href, // 当前页面地址
    width:150,
    height:150
});
</script>

</body>
</html>
